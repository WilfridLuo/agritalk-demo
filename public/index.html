<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgriTalk</title>
    <meta
      name="description"
      content="AgriTalk immersive landing experience for agricultural consultation."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="landing-body landing-prelude">
    <div class="landing-splash" id="landingSplash">
      <div class="splash-copy">
        <span class="splash-kicker">AgriTalk</span>
        <h2>Listen first.</h2>
        <p>Evidence-first crop diagnosis for field decisions.</p>
        <div class="splash-agri-notes" aria-label="Agricultural focus">
          <span>Crop disease triage</span>
          <span>Plant growth advice</span>
          <span>Actionable crop care</span>
        </div>
      </div>
      <button class="button splash-enter" id="enterExperience" type="button">Enter</button>
    </div>

    <div class="landing-atmosphere" aria-hidden="true">
      <div class="sky-haze haze-a"></div>
      <div class="sky-haze haze-b"></div>
      <div class="sun-disc"></div>
      <div class="ridge ridge-back"></div>
      <div class="ridge ridge-mid"></div>
      <div class="ridge ridge-front"></div>
      <div class="fog fog-a"></div>
      <div class="fog fog-b"></div>
    </div>

    <header class="site-topbar">
      <a class="brand-link" href="./index.html">
        <span class="brand-mark"></span>
        <span class="brand-title">AgriTalk</span>
      </a>
      <nav class="site-nav">
        <a href="./select.html">Demo</a>
        <a href="./about.html">About</a>
      </nav>
    </header>

    <main class="landing-main">
      <section class="landing-hero">
        <span class="eyebrow">Field Intelligence Agent</span>
        <h1>Ask before you guess.</h1>
        <p class="landing-subline">
          Agricultural consultation that waits for evidence before it speaks.
        </p>
        <div class="landing-actions">
          <a class="button primary xl" href="./select.html">Enter Demo</a>
          <a class="button ghost xl" href="./about.html">Read Project</a>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
